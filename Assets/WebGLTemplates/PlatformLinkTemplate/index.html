<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="stylesheet" href="TemplateData/loading-screen.css">

    <!-- Yandex Games SDK -->
    <script src="/sdk.js"></script>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" class="unity-canvas"></canvas>
      <div id="canvas-overlay" class="canvas-overlay"></div>
    </div>
    
    <script src="./TemplateData/loading-screen.js"></script>
    <script src="./TemplateData/plugin.js"></script>
    <script src="./TemplateData/fit.js"></script>

    <script>      
      const buildUrl = "Build";
      const loadingScreenManualClose = "__PL_LOADING_SCREEN_MANUAL_CLOSE__" === "true";
      const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      const config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const canvasOverlay = document.querySelector("#canvas-overlay");
      const loadingScreen = window.RetroLoadingScreen ? window.RetroLoadingScreen.create(canvasOverlay) : null;

      let fitGameScreen = () => {
        fit(container);
      };

        window.addEventListener('resize', fitGameScreen);

        // Block browser context menu (right-click / long-press) — Yandex req. 1.6.1.8 / 1.6.2.7
        window.addEventListener('contextmenu', (e) => e.preventDefault());

      let myGameInstance = null;

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          if (loadingScreen) {
            loadingScreen.setProgress(progress);
          }

          fitGameScreen();
        }).then((unityInstance) => {
          myGameInstance = unityInstance;
          if (loadingScreen && loadingScreenManualClose == false) {
            loadingScreen.hide();
          } else if (!loadingScreen) {
            canvasOverlay.style.display = "none";
          }
        }).catch((message) => {
          console.error(message);
        });
      };
      document.body.appendChild(script);

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
    </script>
  </body>
</html>
